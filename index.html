<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryptic Astro Crossword</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #f5f3ef; --bg-elev: #ffffff;
    --bg-banner: linear-gradient(135deg, #ede9fe 0%, #dbeafe 50%, #d1fae5 100%);
    --border: #d4d0c8; --border-grid: #1f2937;
    --text: #1f2937; --text-muted: #6b7280; --text-soft: #4b5563;
    --accent: #6d28d9; --accent-soft: #f3efff;
    --cell-bg: #ffffff; --cell-black: #1f2937;
    --cell-highlighted: #dbeafe; --cell-active: #c7d2fe; --cell-active-border: #6366f1;
    --cell-number: #6b7280; --bar-color: #1f2937;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 6px 20px rgba(0,0,0,0.06);
    --seg-def: #047857; --seg-fodder: #b91c1c; --seg-indicator: #1d4ed8;
    --green: #10b981; --green-soft: #d1fae5;
    --red: #dc2626; --red-soft: #fee2e2; --amber: #d97706;
}
body.dark {
    --bg: #0f0f1a; --bg-elev: #141422;
    --bg-banner: linear-gradient(135deg, #1a1a3e 0%, #2d1b4e 50%, #1a2a4e 100%);
    --border: #2a2a44; --border-grid: #e0e0e0;
    --text: #e0e0e0; --text-muted: #9ca3af; --text-soft: #d1d5db;
    --accent: #a78bfa; --accent-soft: #251a4a;
    --cell-bg: #1e1e2e; --cell-black: #0a0a12;
    --cell-highlighted: #1e2a4a; --cell-active: #3b2a78; --cell-active-border: #a78bfa;
    --cell-number: #9ca3af; --bar-color: #e0e0e0;
    --shadow: 0 4px 12px rgba(0,0,0,0.3); --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
    --seg-def: #34d399; --seg-fodder: #f87171; --seg-indicator: #60a5fa;
    --green: #34d399; --green-soft: #064e3b;
    --red: #f87171; --red-soft: #7f1d1d; --amber: #fbbf24;
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }

#toggle-banner { background: var(--bg-banner); border-bottom: 1px solid var(--border); padding: 8px 16px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
.banner-content { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 18px; flex-wrap: wrap; min-height: 38px; }
.banner-left { display: flex; align-items: center; gap: 10px; flex-shrink: 1; min-width: 0; }
.banner-title { font-size: 0.95rem; font-weight: 800; background: linear-gradient(90deg, #6d28d9, #2563eb, #059669); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; white-space: nowrap; }
body.dark .banner-title { background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.banner-subtitle { font-size: 0.78rem; color: var(--text-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.banner-subtitle strong { color: #dc2626; }
body.dark .banner-subtitle strong { color: #f87171; }

.toggle-group { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
.toggle-divider { width: 1px; height: 22px; background: var(--border); }
.toggle-switch { display: flex; align-items: center; cursor: pointer; user-select: none; gap: 7px; }
.toggle-switch input { display: none; }
.slider { width: 34px; height: 18px; background: #9ca3af; border-radius: 10px; position: relative; transition: background 0.25s; flex-shrink: 0; }
.slider::after { content: ''; position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: all 0.25s; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
.toggle-switch input:checked + .slider { background: #6d28d9; }
body.dark .toggle-switch input:checked + .slider { background: #6366f1; }
.toggle-switch input:checked + .slider::after { left: 19px; }
.toggle-label { font-size: 0.8rem; font-weight: 500; display: flex; align-items: center; gap: 5px; color: var(--text); }
.swatch { display: inline-block; width: 11px; height: 11px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.08); }
.swatch-def { background: var(--seg-def); } .swatch-fodder { background: var(--seg-fodder); } .swatch-indicator { background: var(--seg-indicator); }

#status-bar { width: 100%; padding: 10px 16px; background: var(--bg-elev); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; flex-wrap: wrap; box-shadow: var(--shadow); }
.status-block { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--accent-soft); border-radius: 8px; font-size: 0.95rem; font-weight: 600; color: var(--text); }
.status-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted); font-weight: 700; }
.status-value { font-family: 'Inter', sans-serif; font-variant-numeric: tabular-nums; font-size: 1.05rem; }
#timer-value.warning { color: var(--amber); } #timer-value.danger { color: var(--red); } #timer-value.done { color: var(--red); }
.action-btn { padding: 7px 14px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--text); border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-weight: 600; font-family: 'Inter', sans-serif; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.action-btn:hover:not(:disabled) { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.action-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.action-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.action-btn.primary:hover:not(:disabled) { filter: brightness(1.08); }
.action-btn.danger { color: var(--red); border-color: var(--red); }
.action-btn.danger:hover:not(:disabled) { background: var(--red); color: #fff; }
.action-btn.success { background: var(--green); color: #fff; border-color: var(--green); }
.action-btn.success:hover:not(:disabled) { filter: brightness(1.08); }
.spacer { flex: 1; }

/* Leaderboard button state */
#btn-leaderboard.lb-ready { border-color: var(--accent); color: var(--accent); }
#btn-leaderboard.lb-loading { opacity: 0.7; }

#main-container { display: grid; grid-template-columns: auto minmax(0, 1fr) minmax(0, 1fr); gap: 20px; width: 100%; padding: 18px 16px; align-items: start; }
.section-title { font-size: 0.82rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; }

#grid-section { display: flex; flex-direction: column; }
#crossword-grid { display: grid; grid-template-columns: repeat(11, 44px); grid-template-rows: repeat(11, 44px); width: calc(44px * 11 + 6px); border: 3px solid var(--border-grid); border-radius: 4px; overflow: hidden; background: var(--border-grid); box-shadow: var(--shadow-lg); position: relative; }
.cell { width: 44px; height: 44px; position: relative; background: var(--cell-bg); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.12s; outline: 0.5px solid var(--border); outline-offset: -0.5px; }
.cell.black { background: var(--cell-black); cursor: default; }
.cell input { width: 100%; height: 100%; border: none; background: transparent; color: var(--text); font-size: 1.15rem; font-weight: 700; text-align: center; text-transform: uppercase; caret-color: var(--accent); outline: none; font-family: 'Inter', sans-serif; padding-top: 8px; position: relative; z-index: 1; }
.cell .cell-number { position: absolute; top: 1px; left: 3px; font-size: 0.6rem; font-weight: 700; color: var(--cell-number); line-height: 1; pointer-events: none; z-index: 2; }
.cell.highlighted { background: var(--cell-highlighted); }
.cell.active { background: var(--cell-active); box-shadow: inset 0 0 0 2px var(--cell-active-border); z-index: 2; }
.cell.bar-right { border-right: 3px solid var(--bar-color); }
.cell.bar-left { border-left: 3px solid var(--bar-color); }
.cell.wrong input { color: var(--red); text-decoration: line-through; text-decoration-thickness: 2px; text-decoration-color: var(--red); }
.cell.wrong { background: var(--red-soft); }
.cell.wrong.highlighted { background: var(--red-soft); }
.cell.wrong.active { background: var(--red-soft); box-shadow: inset 0 0 0 2px var(--red); }
.cell.revealed input { color: var(--text-muted); font-style: italic; }
.cell.flash-correct { animation: flashCorrect 1.1s ease-out; }
@keyframes flashCorrect { 0% { background: var(--green); box-shadow: inset 0 0 0 2px var(--green); } 60% { background: var(--green-soft); } 100% { background: var(--cell-bg); } }

#correct-flash { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.7); background: var(--green); color: #fff; font-size: 2.4rem; font-weight: 800; padding: 20px 50px; border-radius: 16px; letter-spacing: 4px; box-shadow: 0 20px 60px rgba(16,185,129,0.4); opacity: 0; pointer-events: none; z-index: 200; transition: all 0.25s ease-out; font-family: 'Inter', sans-serif; }
#correct-flash.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

#current-clue-display { margin-top: 12px; padding: 12px 16px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; font-family: 'Spectral', serif; font-size: 1.05rem; width: calc(44px * 11 + 6px); line-height: 1.45; color: var(--text-soft); box-shadow: var(--shadow); }

#across-clues, #down-clues { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; box-shadow: var(--shadow); min-width: 0; }
.clue-item { padding: 7px 12px; margin-bottom: 2px; border-radius: 6px; cursor: pointer; transition: background 0.12s; font-family: 'Spectral', serif; font-size: 1.13rem; line-height: 1.45; display: flex; gap: 12px; color: var(--text); border-left: 3px solid transparent; }
.clue-item:hover { background: var(--cell-highlighted); }
.clue-item.active-clue { background: var(--accent-soft); border-left: 3px solid var(--accent); }
.clue-item.solved { opacity: 0.55; }
.clue-item.solved .clue-text { text-decoration: line-through; text-decoration-color: var(--text-muted); text-decoration-thickness: 1px; }
.clue-number { font-weight: 700; color: var(--accent); min-width: 24px; font-family: 'Inter', sans-serif; font-size: 0.92rem; padding-top: 4px; text-align: right; flex-shrink: 0; }
.clue-text { flex: 1; min-width: 0; }
.clue-length { color: var(--text-muted); font-size: 0.92rem; font-family: 'Inter', sans-serif; margin-left: 3px; }

.clue-segment { transition: color 0.2s; }
body.show-def .seg-def { color: var(--seg-def); text-decoration: underline; text-decoration-color: var(--seg-def); text-decoration-thickness: 1.5px; text-underline-offset: 3px; font-weight: 500; }
body.show-fodder .seg-fodder { color: var(--seg-fodder); font-weight: 500; }
body.show-indicator .seg-indicator { color: var(--seg-indicator); font-style: italic; font-weight: 500; }
.seg-aux { color: inherit; font-style: normal; }

/* ── Modal ── */
#modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 300; backdrop-filter: blur(2px); }
#modal-backdrop.show { display: flex; }
.modal-box { background: var(--bg-elev); border-radius: 14px; padding: 24px 28px; max-width: 560px; width: calc(100% - 32px); box-shadow: 0 20px 60px rgba(0,0,0,0.25); border: 1px solid var(--border); max-height: 85vh; overflow-y: auto; }
.modal-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; color: var(--text); }
.modal-body { font-size: 0.95rem; color: var(--text-soft); line-height: 1.5; margin-bottom: 18px; }
.modal-body strong { color: var(--text); }
.modal-body input[type=text] { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; font-size: 1rem; margin-top: 8px; }
.modal-body input[type=text]:focus { outline: none; border-color: var(--accent); }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; }

/* ── Leaderboard table ── */
.lb-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 0.8rem; color: var(--text-muted); }
.lb-meta a { color: var(--accent); text-decoration: underline; cursor: pointer; }
.lb-table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
.lb-table th { text-align: left; padding: 8px 10px; font-size: 0.74rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 700; }
.lb-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
.lb-table tr.me { background: var(--accent-soft); font-weight: 600; }
.lb-rank { width: 36px; color: var(--accent); font-weight: 700; }
.lb-score { font-variant-numeric: tabular-nums; font-weight: 600; }
.lb-time { font-variant-numeric: tabular-nums; color: var(--text-muted); font-size: 0.88rem; }
.lb-empty { text-align: center; padding: 32px 16px; color: var(--text-muted); font-style: italic; }
.lb-spinner { text-align: center; padding: 32px; font-size: 1.5rem; }

@media (max-width: 1100px) { #main-container { grid-template-columns: auto 1fr; } #down-clues { grid-column: 1 / -1; } }
@media (max-width: 820px) { #main-container { grid-template-columns: 1fr; justify-items: center; } #across-clues, #down-clues { width: 100%; max-width: 640px; } #crossword-grid { grid-template-columns: repeat(11, 36px); grid-template-rows: repeat(11, 36px); width: calc(36px * 11 + 6px); } .cell { width: 36px; height: 36px; } .cell input { font-size: 1rem; } #current-clue-display { width: calc(36px * 11 + 6px); } }
@media (max-width: 480px) { #crossword-grid { grid-template-columns: repeat(11, 28px); grid-template-rows: repeat(11, 28px); width: calc(28px * 11 + 6px); } .cell { width: 28px; height: 28px; } .cell input { font-size: 0.8rem; padding-top: 6px; } .cell .cell-number { font-size: 0.5rem; } #current-clue-display { width: calc(28px * 11 + 6px); font-size: 0.9rem; } .clue-item { font-size: 1rem; } .banner-subtitle { display: none; } }
</style>
</head>

<!-- Firebase v10 modular SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "PASTE_YOUR_API_KEY_HERE",
    authDomain: "PASTE_YOUR_AUTH_DOMAIN_HERE",
    projectId: "PASTE_YOUR_PROJECT_ID_HERE",
    storageBucket: "PASTE_YOUR_STORAGE_BUCKET_HERE",
    messagingSenderId: "PASTE_YOUR_MESSAGING_SENDER_ID_HERE",
    appId: "PASTE_YOUR_APP_ID_HERE"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// Expose helpers to the main script
window.FB = { db, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp };

// ─── Background pre-fetch ───────────────────────────────────────────────────
// Start fetching the leaderboard immediately so the data is ready
// before the user ever clicks the button.
window._lbPrefetchPromise = (async () => {
    try {
        const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(100));
        const snap = await getDocs(q);
        const rows = [];
        snap.forEach(doc => {
            const d = doc.data();
            rows.push({
                id: doc.id,
                name: d.name || '?',
                score: d.score || 0,
                timeUsedSeconds: d.timeUsedSeconds || 0,
                wordsCorrect: d.wordsCorrect || 0,
                wordsRevealed: d.wordsRevealed || 0
            });
        });
        rows.sort((a, b) => b.score - a.score || a.timeUsedSeconds - b.timeUsedSeconds);
        return rows;
    } catch (e) {
        console.warn('LB prefetch failed:', e);
        return null; // null = prefetch failed, will retry on demand
    }
})();

window.dispatchEvent(new Event('firebase-ready'));
</script>

// ============ LEADERBOARD CACHE ============
// lbCache holds:  { rows: Array, fetchedAt: Number } | null
let lbCache = null;
const LB_CACHE_MAX_MS = 30 * 1000; // 30 s before a re-fetch is allowed

// Wire up the prefetch result as soon as it resolves
// (may happen before or after DOMContentLoaded — both cases handled)
function acceptPrefetchResult(rows) {
    if (!rows) return; // prefetch failed — cache stays null, demand-fetch will try again
    lbCache = { rows, fetchedAt: Date.now() };
    // Mark the button to show data is ready
    const btn = document.getElementById('btn-leaderboard');
    if (btn) btn.classList.add('lb-ready');
}
if (window._lbPrefetchPromise) {
    window._lbPrefetchPromise.then(acceptPrefetchResult);
} else {
    window.addEventListener('firebase-ready', () => {
        if (window._lbPrefetchPromise) window._lbPrefetchPromise.then(acceptPrefetchResult);
    });
}

// ============ PERSISTENCE ============
function saveState() {
    if (submitted) return;
    const letters = {};
    Object.keys(cells).forEach(key => {
        const inp = cells[key].querySelector('input');
        if (inp && inp.value) letters[key] = inp.value;
    });
    const wrongCells    = Object.keys(cells).filter(k => cells[k].classList.contains('wrong'));
    const revealedCells = Object.keys(cells).filter(k => cells[k].classList.contains('revealed'));
    const data = { version: 1, letters, wrongCells, revealedCells, wordState, score, timeRemaining, gameOver, submitted, playerName };
    try { localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}
function loadState() {
    try {
        const raw = localStorage.getItem(CONFIG.STORAGE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        if (data.version !== 1) return false;
        Object.keys(data.letters || {}).forEach(key => {
            const inp = cells[key] && cells[key].querySelector('input');
            if (inp) inp.value = data.letters[key];
        });
        (data.wrongCells    || []).forEach(key => cells[key] && cells[key].classList.add('wrong'));
        (data.revealedCells || []).forEach(key => cells[key] && cells[key].classList.add('revealed'));
        if (data.wordState) {
            Object.keys(data.wordState).forEach(id => {
                if (wordState[id]) wordState[id] = data.wordState[id];
            });
            Object.keys(wordState).forEach(id => {
                if (wordState[id].awarded || wordState[id].revealed) {
                    const el = document.querySelector(`.clue-item[data-clue-id="${id}"]`);
                    if (el) el.classList.add('solved');
                }
            });
        }
        score         = data.score         || 0;
        timeRemaining = (typeof data.timeRemaining === 'number') ? data.timeRemaining : CONFIG.INITIAL_TIME_SECONDS;
        gameOver      = !!data.gameOver;
        submitted     = !!data.submitted;
        playerName    = data.playerName    || '';
        return true;
    } catch(e) { return false; }
}

        document.querySelectorAll('.cell input').forEach(i => i.disabled = true);

        startTimer();

// ============ GRID ============
function buildGrid() {
    const gridEl = document.getElementById('crossword-grid');
    for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
            const cellDiv = document.createElement('div');
            cellDiv.className = 'cell';
            cellDiv.dataset.row = r; cellDiv.dataset.col = c;
            if (SOLUTION[r][c] === '#') {
                cellDiv.classList.add('black');
            } else {
                const input = document.createElement('input');
                input.type = 'text'; input.maxLength = 1;
                input.dataset.row = r; input.dataset.col = c;
                input.setAttribute('autocomplete','off'); input.setAttribute('autocorrect','off');
                input.setAttribute('autocapitalize','characters'); input.setAttribute('spellcheck','false');
                input.addEventListener('input', (e) => handleInput(e, r, c));
                input.addEventListener('mousedown', (e) => handleCellClick(e, r, c));
                cellDiv.appendChild(input);
            }
            const clueNum = CLUE_NUMBERS.find(cn => cn.row === r && cn.col === c);
            if (clueNum) {
                const numLabel = document.createElement('span');
                numLabel.className = 'cell-number'; numLabel.textContent = clueNum.number;
                cellDiv.appendChild(numLabel);
            }
            BARS.forEach(bar => {
                if (bar.row === r && bar.col === c) {
                    if (bar.side === 'right') cellDiv.classList.add('bar-right');
                    if (bar.side === 'left')  cellDiv.classList.add('bar-left');
                }
            });
            gridEl.appendChild(cellDiv);
            cells[`${r}-${c}`] = cellDiv;
        }
    }
}

// ============ CLUE RENDERING ============
function renderClues() {
    const acrossList = document.getElementById('across-list');
    const downList   = document.getElementById('down-list');
    ACROSS_CLUE_ORDER.forEach(id => acrossList.appendChild(createClueElement(id, CLUE_ANNOTATIONS[id])));
    DOWN_CLUE_ORDER.forEach(id   => downList.appendChild(createClueElement(id, CLUE_ANNOTATIONS[id])));
}
function createClueElement(id, clue) {
    const div = document.createElement('div');
    div.className = 'clue-item'; div.dataset.clueId = id;
    const numSpan  = document.createElement('span');
    numSpan.className = 'clue-number'; numSpan.textContent = clue.number;
    const textSpan = document.createElement('span');
    textSpan.className = 'clue-text';
    clue.segments.forEach(seg => {
        const s = document.createElement('span');
        s.className = `clue-segment seg-${seg.type}`;
        s.textContent = seg.text;
        textSpan.appendChild(s);
    });
    const lengthSpan = document.createElement('span');
    lengthSpan.className = 'clue-length';
    lengthSpan.textContent = ' ' + clue.length;
    textSpan.appendChild(lengthSpan);
    div.appendChild(numSpan); div.appendChild(textSpan);
    div.addEventListener('click', () => selectClue(id));
    return div;
}
function getClueLabel(id) {
    const clue = CLUE_ANNOTATIONS[id]; if (!clue) return '';
    return clue.number + ' ' + (clue.direction === 'across' ? 'Across' : 'Down');
}

// ============ INPUT / NAVIGATION ============
function handleCellClick(e, row, col) {
    e.preventDefault();
    if (SOLUTION[row][col] === '#' || gameOver) return;
    if (currentRow === row && currentCol === col) { toggleDirection(row, col); }
    else {
        const clueId = findClueForCell(row, col, currentDirection);
        if (clueId) { currentRow = row; currentCol = col; currentClueId = clueId; currentDirection = clueId.endsWith('A') ? 'across' : 'down'; }
        else {
            const otherDir = currentDirection === 'across' ? 'down' : 'across';
            const otherId  = findClueForCell(row, col, otherDir);
            if (otherId) { currentRow = row; currentCol = col; currentClueId = otherId; currentDirection = otherDir; }
        }
    }
    updateHighlighting(); focusCell(currentRow, currentCol);
}
function toggleDirection(row, col) {
    const otherDir = currentDirection === 'across' ? 'down' : 'across';
    const otherId  = findClueForCell(row, col, otherDir);
    if (otherId) { currentDirection = otherDir; currentClueId = otherId; }
    updateHighlighting();
}
function handleInput(e, row, col) {
    if (gameOver) return;
    const input = e.target;
    let val = input.value.replace(/[^a-zA-Z]/g, '');
    if (val.length > 1) val = val.charAt(val.length - 1);
    input.value = val.toUpperCase();
    const cell = cells[`${row}-${col}`];
    if (cell) cell.classList.remove('wrong');
    if (val) moveToNextCell();
    checkWordsAtCell(row, col);
    saveState();
}
function handleKeyDown(e) {
    if (currentRow === null || currentCol === null || gameOver) return;
    if (document.getElementById('modal-backdrop').classList.contains('show')) return;
    switch (e.key) {
        case 'Tab':       e.preventDefault(); moveToNextClue(e.shiftKey); break;
        case 'ArrowRight':e.preventDefault(); moveInDirection(0,  1); break;
        case 'ArrowLeft': e.preventDefault(); moveInDirection(0, -1); break;
        case 'ArrowDown': e.preventDefault(); moveInDirection( 1, 0); break;
        case 'ArrowUp':   e.preventDefault(); moveInDirection(-1, 0); break;
        case 'Backspace': e.preventDefault(); handleBackspace(); break;
        case 'Delete':    e.preventDefault(); clearCurrentCell(); break;
        case ' ':         e.preventDefault(); toggleDirection(currentRow, currentCol); focusCell(currentRow, currentCol); break;
    }
}
function handleBackspace() {
    const input = getCellInput(currentRow, currentCol);
    const cell  = cells[`${currentRow}-${currentCol}`];
    if (cell) cell.classList.remove('wrong');
    if (input && input.value) { input.value = ''; }
    else {
        moveToPrevCell();
        const p  = getCellInput(currentRow, currentCol);
        const pc = cells[`${currentRow}-${currentCol}`];
        if (pc) pc.classList.remove('wrong');
        if (p)  p.value = '';
    }
    saveState();
}
function clearCurrentCell() {
    const input = getCellInput(currentRow, currentCol);
    const cell  = cells[`${currentRow}-${currentCol}`];
    if (cell)  cell.classList.remove('wrong');
    if (input) input.value = '';
    saveState();
}
function moveToNextCell() {
    if (!currentClueId) return;
    const cc = CLUE_CELLS[currentClueId]; if (!cc) return;
    const idx = cc.findIndex(c => c.row === currentRow && c.col === currentCol);
    if (idx < cc.length - 1) { const n = cc[idx+1]; currentRow = n.row; currentCol = n.col; updateHighlighting(); focusCell(currentRow, currentCol); }
}
function moveToPrevCell() {
    if (!currentClueId) return;
    const cc = CLUE_CELLS[currentClueId]; if (!cc) return;
    const idx = cc.findIndex(c => c.row === currentRow && c.col === currentCol);
    if (idx > 0) { const p = cc[idx-1]; currentRow = p.row; currentCol = p.col; updateHighlighting(); focusCell(currentRow, currentCol); }
}
function moveInDirection(dRow, dCol) {
    let nRow = currentRow + dRow, nCol = currentCol + dCol;
    while (nRow >= 0 && nRow < GRID_SIZE && nCol >= 0 && nCol < GRID_SIZE) {
        if (SOLUTION[nRow][nCol] !== '#') {
            currentRow = nRow; currentCol = nCol;
            if (dRow !== 0 && dCol === 0) currentDirection = 'down';
            else if (dCol !== 0 && dRow === 0) currentDirection = 'across';
            const clueId = findClueForCell(currentRow, currentCol, currentDirection);
            if (clueId) currentClueId = clueId;
            else {
                const otherDir = currentDirection === 'across' ? 'down' : 'across';
                const otherId  = findClueForCell(currentRow, currentCol, otherDir);
                if (otherId) { currentClueId = otherId; currentDirection = otherDir; }
            }
            updateHighlighting(); focusCell(currentRow, currentCol); return;
        }
        nRow += dRow; nCol += dCol;
    }
}
function moveToNextClue(reverse) {
    if (!currentClueId) return;
    const isAcross = currentClueId.endsWith('A');
    const list = isAcross ? ACROSS_CLUE_ORDER : DOWN_CLUE_ORDER;
    const idx  = list.indexOf(currentClueId);
    selectClue(list[reverse ? (idx - 1 + list.length) % list.length : (idx + 1) % list.length]);
}
function selectClue(clueId) {
    currentClueId = clueId;
    currentDirection = clueId.endsWith('A') ? 'across' : 'down';
    const cc = CLUE_CELLS[clueId];
    if (cc && cc.length > 0) { currentRow = cc[0].row; currentCol = cc[0].col; }
    updateHighlighting(); focusCell(currentRow, currentCol);
}

function updateHighlighting() {
    Object.values(cells).forEach(c => c.classList.remove('highlighted', 'active'));
    document.querySelectorAll('.clue-item').forEach(el => el.classList.remove('active-clue'));
    if (!currentClueId) return;
    const cc = CLUE_CELLS[currentClueId];
    if (cc) cc.forEach(c => { const cell = cells[`${c.row}-${c.col}`]; if (cell) cell.classList.add('highlighted'); });
    if (currentRow !== null && currentCol !== null) { const a = cells[`${currentRow}-${currentCol}`]; if (a) a.classList.add('active'); }
    const clueEl = document.querySelector(`.clue-item[data-clue-id="${currentClueId}"]`);
    if (clueEl) clueEl.classList.add('active-clue');
    updateClueDisplay();
    updateStatusBar();
}
function updateClueDisplay() {
    const display = document.getElementById('current-clue-display');
    if (!currentClueId) { display.textContent = 'Click a cell to begin'; return; }
    const clue = CLUE_ANNOTATIONS[currentClueId];
    if (!clue) return;
    let text = ''; clue.segments.forEach(seg => { text += seg.text; });
    display.innerHTML = `<strong>${getClueLabel(currentClueId)}:</strong> ${text} <span style="color:var(--text-muted)">${clue.length}</span>`;
}

function findClueForCell(row, col, direction) {
    const list = direction === 'across' ? ACROSS_CLUE_ORDER : DOWN_CLUE_ORDER;
    for (const id of list) { const cc = CLUE_CELLS[id]; if (cc && cc.some(c => c.row === row && c.col === col)) return id; }
    return null;
}
function getCellInput(row, col) { const cell = cells[`${row}-${col}`]; return cell ? cell.querySelector('input') : null; }
function focusCell(row, col) { const input = getCellInput(row, col); if (input) { input.focus(); input.select(); } }
function getWordEntered(clueId) {
    const list = CLUE_CELLS[clueId]; let s = '';
    for (const c of list) { const inp = getCellInput(c.row, c.col); s += (inp && inp.value) ? inp.value.toUpperCase() : ' '; }
    return s;
}
function isWordCorrect(clueId) { return getWordEntered(clueId) === CLUE_ANNOTATIONS[clueId].answer; }
function clueIdsForCell(row, col) {
    return Object.keys(CLUE_CELLS).filter(id => CLUE_CELLS[id].some(c => c.row === row && c.col === col));
}

function setupToggles() {
    document.getElementById('toggle-def').addEventListener('change', e => document.body.classList.toggle('show-def', e.target.checked));
    document.getElementById('toggle-fodder').addEventListener('change', e => document.body.classList.toggle('show-fodder', e.target.checked));
    document.getElementById('toggle-indicator').addEventListener('change', e => document.body.classList.toggle('show-indicator', e.target.checked));
    document.getElementById('toggle-theme').addEventListener('change', e => document.body.classList.toggle('dark', e.target.checked));
}

// ============ TIMER ============
function startTimer() {
    updateTimerDisplay();
    timerInterval = setInterval(() => {
        if (gameOver) return;
        timeRemaining--;
        if (timeRemaining <= 0) { timeRemaining = 0; updateTimerDisplay(); endGameByTimeout(); return; }
        updateTimerDisplay();
        if (timeRemaining % 10 === 0) saveState();
    }, 1000);
}
function updateTimerDisplay() {
    const el = document.getElementById('timer-value');
    const h = Math.floor(timeRemaining / 3600);
    const m = Math.floor((timeRemaining % 3600) / 60);
    const s = timeRemaining % 60;
    el.textContent = h > 0
        ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${m}:${String(s).padStart(2,'0')}`;
    el.classList.remove('warning','danger','done');
    if      (timeRemaining === 0)  el.classList.add('done');
    else if (timeRemaining < 60)   el.classList.add('danger');
    else if (timeRemaining < 300)  el.classList.add('warning');
}
function endGameByTimeout() {
    gameOver = true;
    clearInterval(timerInterval);
    document.querySelectorAll('.cell input').forEach(i => i.disabled = true);
    saveState();
    promptSubmit("⏱ Time's up!", "Your time has run out. Submit your score to the leaderboard?");
}

// ============ STATUS BAR ============
function updateStatusBar() {
    document.getElementById('score-value').textContent = score;
    const ws      = currentClueId ? wordState[currentClueId] : null;
    const checksEl  = document.getElementById('checks-value');
    const btnCheck  = document.getElementById('btn-check');
    const btnReveal = document.getElementById('btn-reveal');
    const btnSubmit = document.getElementById('btn-submit');
    if (!currentClueId || !ws) {
        checksEl.textContent = '— / 3';
        btnCheck.disabled = true; btnReveal.disabled = true;
    } else {
        checksEl.textContent = `${ws.checksUsed} / ${CONFIG.MAX_CHECKS_PER_WORD}`;
        btnCheck.disabled  = ws.revealed || submitted || gameOver;
        btnReveal.disabled = ws.revealed || submitted || gameOver;
    }
    btnSubmit.disabled = submitted;
}

// ============ WORD CHECKING / AWARDING ============
function checkWordsAtCell(row, col) {
    clueIdsForCell(row, col).forEach(id => {
        const ws = wordState[id];
        if (ws.awarded || ws.revealed) return;
        if (isWordCorrect(id)) awardCorrectWord(id, true);
    });
}
function awardCorrectWord(clueId, flash) {
    const ws = wordState[clueId];
    if (ws.awarded) return;
    ws.awarded = true;
    score += CONFIG.POINTS_PER_WORD;
    const clueEl = document.querySelector(`.clue-item[data-clue-id="${clueId}"]`);
    if (clueEl) clueEl.classList.add('solved');
    if (flash) {
        CLUE_CELLS[clueId].forEach(c => {
            const cell = cells[`${c.row}-${c.col}`];
            if (cell) { cell.classList.remove('flash-correct'); void cell.offsetWidth; cell.classList.add('flash-correct'); setTimeout(() => cell.classList.remove('flash-correct'), 1200); }
        });
        showCorrectFlash();
    }
    updateStatusBar(); saveState();
    checkAllSolved();
}
function showCorrectFlash() {
    const f = document.getElementById('correct-flash');
    f.classList.add('show'); setTimeout(() => f.classList.remove('show'), 800);
}
function checkAllSolved() {
    const allDone = Object.keys(CLUE_ANNOTATIONS).every(id => wordState[id].awarded || wordState[id].revealed);
    if (allDone && !gameOver) {
        gameOver = true; clearInterval(timerInterval); saveState();
        setTimeout(() => promptSubmit("🎉 Puzzle complete!", "You filled in every word. Submit your score to the leaderboard?"), 1100);
    }
}

// ============ ACTION BUTTONS ============
function setupActionButtons() {
    document.getElementById('btn-check').addEventListener('click', onCheckClicked);
    document.getElementById('btn-reveal').addEventListener('click', onRevealClicked);
    document.getElementById('btn-submit').addEventListener('click', onSubmitClicked);
    document.getElementById('btn-leaderboard').addEventListener('click', () => showLeaderboard(false));
}

function onCheckClicked() {
    if (!currentClueId || gameOver || submitted) return;
    const ws = wordState[currentClueId];
    if (ws.revealed) return;
    if (ws.checksUsed >= CONFIG.MAX_CHECKS_PER_WORD) {
        showModal({ title: "🚨 Max checks reached",
            body: `You've used all <strong>${CONFIG.MAX_CHECKS_PER_WORD}</strong> checks on this word. Checking again will <strong>reveal</strong> it instead.<br><br>Previous check costs (${ws.checksUsed * CONFIG.CHECK_COST} pts) will be refunded; a reveal cost (−${CONFIG.REVEAL_COST}) will apply.`,
            confirmText: "Reveal Word", showCancel: true, onConfirm: () => performReveal(currentClueId, true) });
        return;
    }
    showModal({ title: "🔍 Check this word?",
        body: `Wrong letters will be <strong style="color:var(--red)">struck through in red</strong>. This costs <strong>−${CONFIG.CHECK_COST}</strong> points.<br><br>Checks used: <strong>${ws.checksUsed} / ${CONFIG.MAX_CHECKS_PER_WORD}</strong>`,
        confirmText: "Check", showCancel: true, onConfirm: () => performCheck(currentClueId) });
}
function performCheck(clueId) {
    const ws = wordState[clueId];
    if (ws.revealed || ws.checksUsed >= CONFIG.MAX_CHECKS_PER_WORD) return;
    ws.checksUsed++; score -= CONFIG.CHECK_COST;
    const ans = CLUE_ANNOTATIONS[clueId].answer;
    CLUE_CELLS[clueId].forEach((c, idx) => {
        const inp  = getCellInput(c.row, c.col);
        const cell = cells[`${c.row}-${c.col}`];
        const v = (inp && inp.value) ? inp.value.toUpperCase() : '';
        if (v && v !== ans[idx]) cell.classList.add('wrong');
        else if (v === ans[idx]) cell.classList.remove('wrong');
    });
    updateStatusBar(); saveState();
}
function onRevealClicked() {
    if (!currentClueId || gameOver || submitted) return;
    const ws = wordState[currentClueId];
    if (ws.revealed) return;
    const refund    = ws.checksUsed * CONFIG.CHECK_COST;
    const refundMsg = refund > 0 ? `<br><br>You've used <strong>${ws.checksUsed}</strong> check(s) on this word — those <strong>${refund}</strong> points will be refunded.` : '';
    showModal({ title: "💡 Reveal this word?",
        body: `The full answer will be filled in. Costs <strong>−${CONFIG.REVEAL_COST}</strong> points (net 0 after the word's +${CONFIG.POINTS_PER_WORD} is credited).${refundMsg}`,
        confirmText: "Reveal", showCancel: true, onConfirm: () => performReveal(currentClueId, true) });
}
function performReveal(clueId, refundChecks) {
    const ws = wordState[clueId];
    if (ws.revealed) return;
    if (refundChecks && ws.checksUsed > 0) { score += ws.checksUsed * CONFIG.CHECK_COST; ws.checksUsed = 0; }
    score -= CONFIG.REVEAL_COST;
    const ans = CLUE_ANNOTATIONS[clueId].answer;
    CLUE_CELLS[clueId].forEach((c, idx) => {
        const inp  = getCellInput(c.row, c.col);
        const cell = cells[`${c.row}-${c.col}`];
        if (inp) { inp.value = ans[idx]; cell.classList.remove('wrong'); cell.classList.add('revealed'); }
    });
    ws.revealed = true;
    if (!ws.awarded) awardCorrectWord(clueId, false);
    CLUE_CELLS[clueId].forEach(c => checkWordsAtCell(c.row, c.col));
    updateStatusBar(); saveState();
}

// ============ SUBMIT FLOW ============
function getStats() {
    let correct = 0, revealed = 0;
    Object.keys(wordState).forEach(id => {
        if (wordState[id].revealed) revealed++;
        else if (wordState[id].awarded) correct++;
    });
    return { correct, revealed, left: TOTAL_WORDS - correct - revealed, timeUsed: CONFIG.INITIAL_TIME_SECONDS - timeRemaining };
}
function fmtDuration(secs) {
    const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60), s = secs % 60;
    return h > 0 ? `${h}h ${m}m ${s}s` : `${m}m ${s}s`;
}
function onSubmitClicked() {
    if (submitted) return;
    promptSubmit("📤 Submit your score?", "Once submitted you won't be able to keep playing this puzzle.");
}
function promptSubmit(title, leadText) {
    if (submitted) { showLeaderboard(false); return; }
    const { correct, revealed, left, timeUsed } = getStats();
    showModal({
        title, showCancel: true, confirmText: "Submit to Leaderboard",
        body: `${leadText}<br><br>
            <strong>Final Score:</strong> ${score} / ${MAX_POSSIBLE_SCORE}<br>
            <strong>Words Solved (by you):</strong> ${correct}<br>
            <strong>Words Revealed:</strong> ${revealed}<br>
            <strong>Words Unanswered:</strong> ${left}<br>
            <strong>Time Used:</strong> ${fmtDuration(timeUsed)}<br><br>
            <label>Enter your name for the leaderboard:</label>
            <input type="text" id="submit-name" maxlength="30" placeholder="Your name" value="${escapeHtml(playerName)}">`,
        onConfirm: () => {
            const name = (document.getElementById('submit-name')?.value || '').trim();
            if (!name) {
                showModal({ title: "Name required", body: "Please enter a name to submit.", confirmText: "OK", showCancel: false,
                    onConfirm: () => promptSubmit(title, leadText) });
                return;
            }
            playerName = name;
            doSubmit(name);
        }
    });
    setTimeout(() => { const el = document.getElementById('submit-name'); if (el) el.focus(); }, 50);
}

async function doSubmit(name) {
    if (submitted) return;
    if (!window.FB) {
        showModal({ title: "Firebase not loaded", body: "Could not reach the leaderboard service. Check your connection and try again.", confirmText: "OK", showCancel: false, onConfirm: () => {} });
        return;
    }
    const { correct, revealed, timeUsed } = getStats();
    submitted = true; gameOver = true;
    clearInterval(timerInterval);
    document.querySelectorAll('.cell input').forEach(i => i.disabled = true);
    saveState(); updateStatusBar();

    // Show "uploading" state immediately
    showModal({ title: "📤 Submitting…", body: "Uploading your score…", confirmText: "Please wait…", showCancel: false, onConfirm: () => {} });
    document.getElementById('modal-confirm').disabled = true;

    try {
        const { db, collection, addDoc, serverTimestamp } = window.FB;
        await addDoc(collection(db, "scores"), {
            name, score,
            timeUsedSeconds: timeUsed,
            wordsCorrect:  correct,
            wordsRevealed: revealed,
            submittedAt: serverTimestamp()
        });

        // Invalidate cache so leaderboard shows this new entry
        lbCache = null;

        // ── Automatically open the leaderboard (no extra click needed) ──
        showLeaderboard(true);

    } catch (err) {
        console.error(err);
        showModal({ title: "Submission failed",
            body: `Couldn't reach the leaderboard.<br><code style="font-size:0.82rem;word-break:break-all;">${escapeHtml((err && err.message) || String(err))}</code>`,
            confirmText: "OK", showCancel: false, onConfirm: () => {} });
    }
}

// ============ LEADERBOARD ============
// Shows the leaderboard modal. If cached data is fresh enough, renders instantly.
// Otherwise shows a spinner and fetches, then renders.
async function showLeaderboard(forceRefresh = false) {
    const now = Date.now();
    const cacheOk = !forceRefresh && lbCache && (now - lbCache.fetchedAt) < LB_CACHE_MAX_MS;

    if (cacheOk) {
        // Data already in memory — render with zero network wait
        renderLeaderboardModal(lbCache.rows, false);
        return;
    }

    // Show the modal immediately with a spinner so the UI is responsive
    showModal({
        title: "🏆 Leaderboard",
        body: `<div class="lb-spinner">⏳</div>`,
        confirmText: "Close", showCancel: false, onConfirm: () => {}
    });

    if (!window.FB) {
        document.getElementById('modal-body').innerHTML = `<div class="lb-empty">Firebase not loaded — check your config.</div>`;
        return;
    }

    try {
        const { db, collection, getDocs, query, orderBy, limit } = window.FB;
        const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(100));
        const snap = await getDocs(q);
        const rows = [];
        snap.forEach(doc => {
            const d = doc.data();
            rows.push({ id: doc.id, name: d.name || '?', score: d.score || 0,
                timeUsedSeconds: d.timeUsedSeconds || 0, wordsCorrect: d.wordsCorrect || 0, wordsRevealed: d.wordsRevealed || 0 });
        });
        rows.sort((a, b) => b.score - a.score || a.timeUsedSeconds - b.timeUsedSeconds);
        lbCache = { rows, fetchedAt: Date.now() };
        // Render into the already-open modal (modal is still open from the spinner above)
        renderLeaderboardModal(rows, false, true /* already open */);
    } catch (err) {
        console.error(err);
        if (document.getElementById('modal-backdrop').classList.contains('show')) {
            document.getElementById('modal-body').innerHTML =
                `<div class="lb-empty">Failed to load. ${escapeHtml((err && err.message) || String(err))}</div>`;
        }
    }
}

// Renders leaderboard content. If alreadyOpen=true, patches the existing open modal body
// instead of calling showModal() again (avoids a flicker / re-open).
function renderLeaderboardModal(rows, forceRefresh, alreadyOpen = false) {
    const ageMs   = lbCache ? Date.now() - lbCache.fetchedAt : 0;
    const ageSecs = Math.round(ageMs / 1000);
    const ageStr  = ageSecs < 5 ? 'just now' : `${ageSecs}s ago`;

    let html = `<div class="lb-meta">
        <span>Updated ${ageStr}</span>
        <a id="lb-refresh-btn">↻ Refresh</a>
    </div>`;

    if (!rows || rows.length === 0) {
        html += `<div class="lb-empty">No scores yet — be the first!</div>`;
    } else {
        html += `<table class="lb-table"><thead><tr>
            <th class="lb-rank">#</th><th>Name</th><th>Score</th><th>Time Used</th><th>✓ / 💡</th>
        </tr></thead><tbody>`;
        rows.forEach((r, i) => {
            const isMe = submitted && r.name === playerName;
            html += `<tr class="${isMe ? 'me' : ''}">
                <td class="lb-rank">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}</td>
                <td>${escapeHtml(r.name)}${isMe ? ' <span style="color:var(--accent);font-size:0.8rem;">(you)</span>' : ''}</td>
                <td class="lb-score">${r.score}</td>
                <td class="lb-time">${fmtDuration(r.timeUsedSeconds)}</td>
                <td class="lb-time">${r.wordsCorrect} / ${r.wordsRevealed}</td>
            </tr>`;
        });
        html += `</tbody></table>`;
    }

    if (alreadyOpen) {
        // Patch open modal in-place — no flicker
        document.getElementById('modal-title').textContent = '🏆 Leaderboard';
        document.getElementById('modal-body').innerHTML = html;
        document.getElementById('modal-cancel').style.display = 'none';
        const confirmBtn = document.getElementById('modal-confirm');
        confirmBtn.textContent = 'Close';
        confirmBtn.disabled = false;
        // Re-bind confirm since alreadyOpen path skips showModal()
        if (modalConfirmHandler) confirmBtn.removeEventListener('click', modalConfirmHandler);
        modalConfirmHandler = () => hideModal();
        confirmBtn.addEventListener('click', modalConfirmHandler);
    } else {
        showModal({ title: "🏆 Leaderboard", body: html, confirmText: "Close", showCancel: false, onConfirm: () => {} });
    }

    // Wire the refresh link regardless of path
    setTimeout(() => {
        const btn = document.getElementById('lb-refresh-btn');
        if (btn) btn.addEventListener('click', () => { lbCache = null; showLeaderboard(true); });
    }, 0);
}

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
}

// ============ MODAL ============
function setupModal() {
    document.getElementById('modal-cancel').addEventListener('click', hideModal);
    document.getElementById('modal-backdrop').addEventListener('click', e => {
        if (e.target.id === 'modal-backdrop') hideModal();
    });
}
let modalConfirmHandler = null;
function showModal({ title, body, confirmText, showCancel, onConfirm }) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = body;
    const confirmBtn = document.getElementById('modal-confirm');
    confirmBtn.textContent = confirmText || 'Confirm';
    confirmBtn.disabled = false;
    document.getElementById('modal-cancel').style.display = showCancel ? '' : 'none';
    if (modalConfirmHandler) confirmBtn.removeEventListener('click', modalConfirmHandler);
    modalConfirmHandler = () => { hideModal(); if (typeof onConfirm === 'function') onConfirm(); };
    confirmBtn.addEventListener('click', modalConfirmHandler);
    document.getElementById('modal-backdrop').classList.add('show');
}
function hideModal() { document.getElementById('modal-backdrop').classList.remove('show'); }
</script>
